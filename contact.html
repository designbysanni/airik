<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — AIRIK ART & ENTERTAINMENT CO.</title>
<meta name="description" content="Start a project with AAEC. Project inquiries, business email, and social links.">
<link rel="icon" type="image/png" href="/assets/images/brand/aquinas-symbol-black.png">
<meta property="og:title" content="Contact — AIRIK ART & ENTERTAINMENT CO.">
<meta property="og:description" content="Start a project with AAEC. Project inquiries, business email, and social links.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://airikart.com/contact">
<meta property="og:image" content="https://airikart.com/assets/images/team/airik-crawford.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://airikart.com/assets/images/team/airik-crawford.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<header class="site-header" data-include-header></header>

<main>
  <section class="page-hero brand-photo-frame">
    <img class="page-hero-media brand-photo" src="/assets/images/stock/chicago-skyline-night.jpg" alt="" role="presentation">
    <div class="container reveal">
      <span class="eyebrow">Get In Touch</span>
      <h1>Start a Project</h1>
      <p class="lede">Tell us about the story you want told.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="grid grid-2">
        <div class="reveal">
          <!-- Submits via fetch() (see initInquiryForms() in main.js) to
               /api/submit-lead.php, which creates/tags the contact in GHL
               server-side. See CLAUDE.md "GHL integration". -->
          <form data-inquiry-form>
            <input type="hidden" name="source" value="contact">
            <!-- Honeypot: real visitors never see or fill this in (see style.css). -->
            <div class="hp-field" aria-hidden="true">
              <label for="website">Website</label>
              <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
            </div>
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required>
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required>
            </div>
            <div>
              <label for="project-type">Project Type</label>
              <select id="project-type" name="project-type">
                <option>Sports</option>
                <option>Community & Wellness</option>
                <option>Music & Culture</option>
                <option>Commercials</option>
                <option>Photography</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label for="budget">Budget Range</label>
              <input id="budget" name="budget" type="text" placeholder="e.g. $5,000–$10,000">
            </div>
            <div>
              <label for="message">Project Details</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Inquiry</button>
            <p class="form-status"></p>
          </form>
        </div>
        <div class="reveal">
          <h3>Business Info</h3>
          <p><a href="mailto:info@airikart.com">info@airikart.com</a></p>
          <h3 style="margin-top:2rem;">Social</h3>
          <div class="tag-list">
            <a class="tag" href="https://www.instagram.com/airikentertainment.co/" target="_blank" rel="noopener">Instagram</a>
            <a class="tag" href="https://www.facebook.com/AirikEntertainment/" target="_blank" rel="noopener">Facebook</a>
            <a class="tag" href="https://www.linkedin.com/company/airikent/" target="_blank" rel="noopener">LinkedIn</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="grid grid-2 reveal" style="align-items:center;">
        <div>
          <span class="eyebrow">Where We Work</span>
          <h2>Based in Chicago.</h2>
          <p>AAEC is a Chicago-based creative agency, working with clients across the city and beyond.</p>
        </div>
        <div class="media-card" style="aspect-ratio:4/3;background:var(--aaec-black-soft);">
          <svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;inset:0;" role="img" aria-label="Stylized map marking Chicago, Illinois on the Lake Michigan shoreline">
            <rect width="600" height="450" fill="var(--aaec-black-soft)"></rect>
            <path d="M 60 40 L 60 260 Q 150 300 190 360 Q 230 410 220 450 L 60 450 Z" fill="none" stroke="var(--aaec-silver)" stroke-width="2" opacity="0.5"></path>
            <path d="M 220 450 Q 260 380 340 340 Q 420 300 460 220 Q 500 140 460 40" fill="none" stroke="var(--aaec-silver)" stroke-width="2" opacity="0.35"></path>
            <circle cx="230" cy="255" r="10" fill="none" stroke="var(--aaec-red)" stroke-width="1.5" opacity="0.5">
              <animate attributeName="r" values="10;40;10" dur="3.5s" repeatCount="indefinite"></animate>
              <animate attributeName="opacity" values="0.5;0;0.5" dur="3.5s" repeatCount="indefinite"></animate>
            </circle>
            <circle cx="230" cy="255" r="7" fill="var(--aaec-red)"></circle>
            <text x="255" y="248" font-family="var(--font-structural)" font-size="20" font-weight="600" fill="var(--aaec-white)" letter-spacing="1">Chicago</text>
            <text x="255" y="270" font-family="var(--font-structural)" font-size="12" fill="var(--aaec-silver)" letter-spacing="2">ILLINOIS</text>
            <g opacity="0.8">
              <path d="M300 380 l4 12 h13 l-10 8 4 12 -11-7 -11 7 4-12 -10-8 h13 z" fill="var(--aaec-red)"></path>
              <path d="M340 390 l4 12 h13 l-10 8 4 12 -11-7 -11 7 4-12 -10-8 h13 z" fill="var(--aaec-red)"></path>
              <path d="M380 380 l4 12 h13 l-10 8 4 12 -11-7 -11 7 4-12 -10-8 h13 z" fill="var(--aaec-red)"></path>
              <path d="M420 390 l4 12 h13 l-10 8 4 12 -11-7 -11 7 4-12 -10-8 h13 z" fill="var(--aaec-red)"></path>
            </g>
          </svg>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer" data-include-footer></footer>
<script src="/assets/js/main.js"></script>
</body>
</html>
